server:
  port: 8080

spring:
  application:
    name: websocketV5

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, threaddump
  endpoint:
    threaddump:
      enabled: true
    health:
      show-details: always

logging:
  level:
    com.study: DEBUG
    org.springframework.messaging: TRACE
    org.springframework.web.socket: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{20} - %msg%n"
