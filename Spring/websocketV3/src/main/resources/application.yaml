server:
  port: 8080
  
spring:
  application:
    name: websocketV3
  mvc:
    async:
      # SSE는 연결이 장시간 유지되므로 타임아웃을 -1(무제한)로 설정
      # 기본값은 30초라 SSE 연결이 자동으로 끊김
      request-timeout: -1

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, threaddump
  endpoint:
    threaddump:
      enabled: true
    health:
      show-details: always
 
logging:
  level:
    com.chat: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{20} - %msg%n"